<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Meeting</title>
<style>
  * { box-sizing: border-box; }
  :root { --bg:#05080d; --fg:#e8eef6; --muted:#9fb3c8; --dim:#7e93ab; --surf:#131f2c; --surf2:#0e1822;
    --tile-bd:#233245; --accent:#7CFFB2; --danger:#ff5a5a; --accept:#3ddc84; }
  body.light { --bg:#e6ecf3; --fg:#12202c; --muted:#566573; --dim:#68798a; --surf:#f3f6f9; --surf2:#e6ecf2; --tile-bd:#c7d2dc; }
  html, body { margin: 0; width: 100%; height: 100%; }
  body { background: var(--bg); color: var(--fg); overflow: hidden; user-select: none;
    font-family: "Segoe UI", system-ui, sans-serif; }
  #wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 22px 34px 16px; gap: 16px; }

  /* ---- top bar: segmented platform control ---- */
  #topbar { display: flex; align-items: center; flex: 0 0 auto; }
  .segctl { display: flex; background: var(--surf); border: 1px solid var(--tile-bd); border-radius: 12px; padding: 4px; }
  .seg { padding: 11px 30px; border-radius: 9px; font-size: 17px; font-weight: 700; color: var(--dim);
    cursor: pointer; transition: background .12s ease, color .12s ease; }
  .seg.active { background: var(--accent); color: #04121f; }

  /* ---- main row: EVERY slot (action cards, the Teams accept stack, the volume stack) is a
     direct child of this one flex row, all sharing the same flex:1/max-width rule -- that's what
     guarantees identical computed widths, not eyeballed pixel values on separate containers.
     #actions is display:contents so its JS-rendered children join this row directly. ---- */
  #mainrow { flex: 1; display: flex; gap: 18px; align-items: stretch; justify-content: center; min-height: 0; }
  #actions { display: contents; }

  /* ---- action buttons: unified icon+label cards. ---- */
  .abtn { flex: 1; max-width: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; border-radius: 18px; border: 1px solid var(--tile-bd); background: var(--surf); color: var(--fg);
    cursor: pointer; box-shadow: 0 2px 10px rgba(0,0,0,.22); transition: transform .08s ease, filter .1s ease; overflow: hidden; }
  .abtn:active { transform: scale(.97); filter: brightness(1.08); }
  .abtn .ic { width: 68px; height: 68px; }
  .abtn .ic svg { width: 100%; height: 100%; fill: currentColor; }
  .abtn .ic.rot135 svg { transform: rotate(135deg); }
  .abtn .cap { font-size: 20px; font-weight: 700; }
  .abtn.accept { background: var(--accept); color: #04160d; border-color: transparent; }
  .abtn.danger { background: var(--danger); color: #1a0505; border-color: transparent; }

  /* ---- stack: two genuinely separate half-height cards with a real gap between them, occupying
     one grid slot. Used for Teams' accept audio/video AND the volume up/down pair -- same pattern,
     same sizing, so there's exactly one way "two related actions" ever get grouped in this UI. ---- */
  .stackwrap { flex: 1; max-width: 320px; display: flex; flex-direction: column; gap: 18px; }
  .stackwrap .abtn { max-width: none; }
  .stackwrap .abtn .ic { width: 52px; height: 52px; }
  .stackwrap .abtn .cap { font-size: 16px; }

  /* ---- status strip: only ever shows real data (last action + result), never fabricated call state ---- */
  #status { flex: 0 0 auto; text-align: center; font-size: 14px; font-weight: 600; color: var(--dim); }
  #status.err { color: var(--danger); }
</style>
</head>
<body>
  <div id="wrap">
    <div id="topbar">
      <div class="segctl" id="segctl">
        <div class="seg" data-platform="zoom">Zoom</div>
        <div class="seg" data-platform="teams">Teams</div>
      </div>
    </div>
    <div id="mainrow">
      <div id="actions"></div>
      <div class="stackwrap">
        <div id="volUp" class="abtn"></div>
        <div id="volDown" class="abtn"></div>
      </div>
    </div>
    <div id="status">Ready</div>
  </div>
  <script src="meetingview.js"></script>
</body>
</html>
