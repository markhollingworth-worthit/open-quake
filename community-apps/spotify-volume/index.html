<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'none'; font-src 'none'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<title>Spotify Volume</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #05080d; --fg: #e8eef6; --muted: #9fb3c8; --dim: #7e93ab;
    --surf1: #11202e; --surf2: #0a1119; --btn-bd: #1a2738; --accent: #7CFFB2;
  }
  body.light {
    --bg: #e6ecf3; --fg: #12202c; --muted: #566573; --dim: #566573;
    --surf1: #ffffff; --surf2: #dfe7ef; --btn-bd: #14202b;
  }
  html, body { width: 100%; height: 100%; }
  body {
    background: var(--bg); color: var(--fg); overflow: hidden; user-select: none;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 28px; padding: 40px;
  }
  #cur {
    font-size: 72px; font-weight: 800; line-height: 1;
    transition: color .15s ease;
  }
  #cur.dim { color: var(--muted); }
  .volrow { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .vpill {
    min-width: 96px; padding: 14px 22px; border-radius: 999px;
    border: 2px solid var(--btn-bd);
    background: linear-gradient(160deg, var(--surf1), var(--surf2));
    color: var(--fg); cursor: pointer; font-size: 24px; font-weight: 700;
    text-align: center; transition: transform .08s ease;
  }
  .vpill:active { transform: scale(.92); }
  .vpill.on {
    color: #04121f; border-color: var(--accent);
    background: linear-gradient(160deg, color-mix(in srgb, var(--accent) 86%, #fff 14%), var(--accent));
  }
  body.light .vpill.on { color: var(--fg); border-color: var(--btn-bd); }
  #lbl { font-size: 20px; color: var(--dim); letter-spacing: .5px; }
</style>
</head>
<body>
<div id="cur" class="dim">—</div>
<div class="volrow" id="volRow"></div>
<div id="lbl">Spotify volume</div>
<script>
(function () {
  var q = new URLSearchParams(location.search);
  document.body.classList.toggle('light', q.get('_dark') === '0');
  var a = q.get('_accent') || '';
  if (/^#[0-9a-fA-F]{6}$/.test(a)) document.documentElement.style.setProperty('--accent', a);
  var proc = q.get('process') || 'Spotify';
  document.getElementById('lbl').textContent = proc + ' volume';

  var LEVELS = [15, 20, 25, 30, 40];
  var pills = LEVELS.map(function (lvl) {
    var b = document.createElement('div');
    b.className = 'vpill'; b.textContent = lvl + '%';
    b.onclick = function () { setVol(lvl); };
    document.getElementById('volRow').appendChild(b);
    return b;
  });

  function markVol(p) {
    var cur = document.getElementById('cur');
    if (typeof p === 'number') { cur.textContent = p + '%'; cur.classList.remove('dim'); }
    else { cur.textContent = '—'; cur.classList.add('dim'); }
    var best = -1, bestD = 3;
    if (typeof p === 'number') {
      LEVELS.forEach(function (lvl, i) { var d = Math.abs(lvl - p); if (d < bestD) { bestD = d; best = i; } });
    }
    pills.forEach(function (b, i) { b.classList.toggle('on', i === best); });
  }

  function setVol(lvl) {
    markVol(lvl);
    fetch('/app-api/set?level=' + lvl, { cache: 'no-store' })
      .then(function (r) { return r.json(); })
      .then(function (d) { markVol(d && typeof d.percent === 'number' ? d.percent : null); })
      .catch(function () {});
  }

  function pollVol() {
    fetch('/app-api/get', { cache: 'no-store' })
      .then(function (r) { return r.json(); })
      .then(function (d) { markVol(d && typeof d.percent === 'number' ? d.percent : null); })
      .catch(function () {});
  }
  pollVol();
  setInterval(pollVol, 3000);
})();
</script>
</body>
</html>
