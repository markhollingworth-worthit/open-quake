<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="60%" stop-color="#00f0ff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <circle cx="256" cy="256" r="240" fill="url(#bgGlow)" />
  
  <!-- Outer Rotating Tick Marks -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#00f0ff" stroke-width="2" stroke-dasharray="4 8" opacity="0.4" />
  
  <!-- Thick Outer segment blocks -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#00f0ff" stroke-width="6" stroke-dasharray="40 15 80 15 50 15" opacity="0.75" filter="url(#glow)" />
  
  <!-- Inner circular grids -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.3" />
  <circle cx="256" cy="256" r="150" fill="none" stroke="#00f0ff" stroke-width="4.5" stroke-dasharray="25 8" opacity="0.8" filter="url(#glow)" />
  <circle cx="256" cy="256" r="115" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.4" />
  
  <!-- Arc Reactor Coil Segments (10 spoke pattern) -->
  <g transform="translate(256, 256)" stroke="#00f0ff" stroke-width="5" filter="url(#glow)" opacity="0.9">
    <!-- Spoke indicators -->
    <line x1="0" y1="-140" x2="0" y2="-125" />
    <line x1="82" y1="-113" x2="73" y2="-101" />
    <line x1="133" y1="-43" x2="119" y2="-38" />
    <line x1="133" y1="43" x2="119" y2="38" />
    <line x1="82" y1="113" x2="73" y2="101" />
    <line x1="0" y1="140" x2="0" y2="125" />
    <line x1="-82" y1="113" x2="-73" y2="101" />
    <line x1="-133" y1="43" x2="-119" y2="38" />
    <line x1="-133" y1="-43" x2="-119" y2="-38" />
    <line x1="-82" y1="-113" x2="-73" y2="-101" />
  </g>

  <!-- Glowing Core Circle & Triangle -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.6" />
  <circle cx="256" cy="256" r="50" fill="none" stroke="#00f0ff" stroke-width="7" filter="url(#glow)" />
  
  <!-- Center Triangle core -->
  <polygon points="256,220 288,276 224,276" fill="none" stroke="#00f0ff" stroke-width="5" filter="url(#glow)" />
  <circle cx="256" cy="260" r="12" fill="#00f0ff" filter="url(#glow)" />
</svg>